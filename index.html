<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>库存展示</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/* 动态光晕背景 */
.bg-glow {
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,122,255,0.5), transparent 70%);
    filter: blur(120px);
    animation: moveGlow 12s infinite alternate ease-in-out;
    z-index: -1;
}

@keyframes moveGlow {
    0% { transform: translate(-100px, -100px); }
    100% { transform: translate(200px, 200px); }
}

.container {
    max-width: 520px;
    margin: auto;
    padding: 40px 20px;
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 30px;
    letter-spacing: -0.5px;
}

.card {
    display: flex;
    gap: 18px;
    align-items: center;
    padding: 18px;
    margin-bottom: 20px;
    border-radius: 22px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(30px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    transform: translateY(40px);
    opacity: 0;
    transition: all 0.6s ease;
}

.card.visible {
    transform: translateY(0);
    opacity: 1;
}

.card img {
    width: 90px;
    height: 90px;
    border-radius: 16px;
    object-fit: cover;
}

.info { flex: 1; }

.name {
    font-size: 17px;
    font-weight: 600;
}

.spec {
    font-size: 13px;
    color: #aaa;
    margin: 4px 0;
}

.price {
    font-size: 15px;
    margin-bottom: 6px;
}

.stock {
    font-size: 13px;
    font-weight: 500;
}

.low { color: #ff453a; }

.flash {
    animation: flashAnim 0.8s ease;
}

@keyframes flashAnim {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); color: #00ffcc; }
    100% { transform: scale(1); }
}

.soldout { opacity: 0.4; }

.badge {
    display: inline-block;
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 999px;
    background: #ff453a;
    color: white;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container">
    <h1>库存展示</h1>
    <div id="list"></div>
</div>

<script>
const SUPABASE_URL = "https://eqvgkuepjficeubrtshf.supabase.co";
const SUPABASE_KEY = "sb_publishable_UPeSm2JHiju82_YNtaZLxg_pgQ4ZjtZ";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let lastStock = {};

async function loadProducts() {
    const { data } = await supabase
        .from("products")
        .select("*")
        .order("id", { ascending: true });

    render(data);
}

function render(data) {
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach((item, index) => {

        const lowClass = item.stock <= 1 ? "low" : "";
        const soldClass = item.stock == 0 ? "soldout" : "";

        const card = document.createElement("div");
        card.className = "card " + soldClass;

        card.innerHTML = `
            <img src="${item.image || 'https://via.placeholder.com/90'}">
            <div class="info">
                <div class="name">${item.name}</div>
                <div class="spec">${item.spec}</div>
                <div class="price">¥ ${item.price}</div>
                <div class="stock ${lowClass}" id="stock-${item.id}">
                    ${item.stock == 0 ? "" : "剩余库存：" + item.stock}
                </div>
                ${item.stock == 0 ? '<div class="badge">已售罄</div>' : ''}
            </div>
        `;

        list.appendChild(card);

        setTimeout(() => {
            card.classList.add("visible");
        }, index * 120);

        if (lastStock[item.id] !== undefined && lastStock[item.id] !== item.stock) {
            const stockEl = document.getElementById("stock-" + item.id);
            if (stockEl) stockEl.classList.add("flash");
        }

        lastStock[item.id] = item.stock;
    });
}

loadProducts();

/* 真·实时更新 */
supabase
.channel('realtime-products')
.on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, payload => {
    loadProducts();
})
.subscribe();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品库存</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f6f6f6;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    font-size: 20px;
    margin-bottom: 20px;
}

.card {
    display: flex;
    gap: 15px;
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 15px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.05);
    transition: 0.2s;
}

.card img {
    width: 80px;
    height: 80px;
    border-radius: 8px;
    object-fit: cover;
}

.info {
    flex: 1;
}

.name {
    font-size: 16px;
    font-weight: 600;
}

.spec {
    font-size: 13px;
    color: #777;
    margin: 4px 0;
}

.price {
    color: #e53935;
    font-size: 14px;
}

.stock {
    margin-top: 4px;
    font-size: 14px;
}

.low {
    color: #e53935;
}

.soldout {
    opacity: 0.4;
}
</style>
</head>

<body>

<div class="container">
    <h1>商品库存</h1>
    <div id="list"></div>
</div>

<script>
const SUPABASE_URL = "https://eqvgkuepjficeubrtshf.supabase.co";
const SUPABASE_KEY = "sb_publishable_UPeSm2JHiju82_YNtaZLxg_pgQ4ZjtZ";

async function loadProducts() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*&order=id.asc`, {
        headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY
        }
    });

    const data = await res.json();
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(item => {

        const lowClass = item.stock <= 1 ? "low" : "";
        const soldClass = item.stock == 0 ? "soldout" : "";

        list.innerHTML += `
            <div class="card ${soldClass}">
                <img src="${item.image}" alt="">
                <div class="info">
                    <div class="name">${item.name}</div>
                    <div class="spec">${item.spec}</div>
                    <div class="price">¥ ${item.price}</div>
                    <div class="stock ${lowClass}">
                        ${item.stock == 0 ? "已售完" : "剩余库存：" + item.stock}
                    </div>
                </div>
            </div>
        `;
    });
}

loadProducts();
setInterval(loadProducts, 30000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>库存展示</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    background: linear-gradient(to bottom, #f2f2f2, #e9e9e9);
    color: #111;
}

.container {
    max-width: 520px;
    margin: auto;
    padding: 30px 20px;
}

h1 {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 30px;
    letter-spacing: -0.5px;
}

.card {
    display: flex;
    gap: 18px;
    align-items: center;
    padding: 18px;
    margin-bottom: 18px;
    border-radius: 22px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    transition: all 0.25s ease;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 14px 40px rgba(0,0,0,0.08);
}

.card img {
    width: 90px;
    height: 90px;
    border-radius: 16px;
    object-fit: cover;
}

.info {
    flex: 1;
}

.name {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 4px;
}

.spec {
    font-size: 13px;
    color: #777;
    margin-bottom: 6px;
}

.price {
    font-size: 15px;
    font-weight: 500;
}

.stock {
    margin-top: 6px;
    font-size: 13px;
    font-weight: 500;
}

.low {
    color: #ff3b30;
}

.soldout {
    opacity: 0.35;
}

.badge {
    display: inline-block;
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 999px;
    background: #ff3b30;
    color: white;
    margin-top: 6px;
}
</style>
</head>

<body>

<div class="container">
    <h1>商品库存</h1>
    <div id="list"></div>
</div>

<script>
const SUPABASE_URL = "https://eqvgkuepjficeubrtshf.supabase.co";
const SUPABASE_KEY = "sb_publishable_UPeSm2JHiju82_YNtaZLxg_pgQ4ZjtZ";

async function loadProducts() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*&order=id.asc`, {
        headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY
        }
    });

    const data = await res.json();
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(item => {

        const lowClass = item.stock <= 1 ? "low" : "";
        const soldClass = item.stock == 0 ? "soldout" : "";

        list.innerHTML += `
            <div class="card ${soldClass}">
                <img src="${item.image || 'https://via.placeholder.com/90'}">
                <div class="info">
                    <div class="name">${item.name}</div>
                    <div class="spec">${item.spec}</div>
                    <div class="price">¥ ${item.price}</div>
                    <div class="stock ${lowClass}">
                        ${item.stock == 0 ? "" : "剩余库存：" + item.stock}
                    </div>
                    ${item.stock == 0 ? '<div class="badge">已售罄</div>' : ''}
                </div>
            </div>
        `;
    });
}

loadProducts();
setInterval(loadProducts, 30000);
</script>

</body>
</html>

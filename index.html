<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>剩余库存:</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/* 动态光晕 */
.bg-glow {
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,122,255,0.5), transparent 70%);
    filter: blur(120px);
    animation: moveGlow 12s infinite alternate ease-in-out;
    z-index: -1;
}

@keyframes moveGlow {
    0% { transform: translate(-100px, -100px); }
    100% { transform: translate(200px, 200px); }
}

.container {
    max-width: 520px;
    margin: auto;
    padding: 40px 20px;
}

h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 30px;
}

/* 卡片 */
.card {
    display: flex;
    gap: 18px;
    align-items: center;
    padding: 18px;
    margin-bottom: 20px;
    border-radius: 22px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(30px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    transition: all 0.35s ease;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 90px;
    height: 90px;
    border-radius: 16px;
    object-fit: cover;
}

.info { flex: 1; }

.name { font-size: 17px; font-weight: 600; }
.spec { font-size: 13px; color: #aaa; margin: 4px 0; }
.price { font-size: 15px; margin-bottom: 6px; }
.stock { font-size: 13px; font-weight: 500; }
.low { color: #ff453a; }

.badge {
    display: inline-block;
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 999px;
    background: #ff453a;
    color: white;
}

/* 放大遮罩层 */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s ease;
    z-index: 999;
}

.overlay.active {
    opacity: 1;
    pointer-events: auto;
}

/* 放大卡片 */
.modal-card {
    width: 90%;
    max-width: 420px;
    border-radius: 28px;
    padding: 30px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(40px);
    box-shadow: 0 20px 80px rgba(0,0,0,0.6);
    transform: scale(0.8);
    transition: 0.3s ease;
}

.overlay.active .modal-card {
    transform: scale(1);
}

.modal-card img {
    width: 100%;
    border-radius: 20px;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container">
    <h1>库存展示</h1>
    <div id="list"></div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()">
    <div class="modal-card" id="modalCard" onclick="event.stopPropagation()"></div>
</div>

<script>
const SUPABASE_URL = "https://eqvgkuepjficeubrtshf.supabase.co";
const SUPABASE_KEY = "sb_publishable_UPeSm2JHiju82_YNtaZLxg_pgQ4ZjtZ";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadProducts() {
    const { data } = await client
        .from("products")
        .select("*")
        .order("id", { ascending: true });

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(item => {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${item.image || 'https://via.placeholder.com/300'}">
            <div class="info">
                <div class="name">${item.name}</div>
                <div class="spec">${item.spec}</div>
                <div class="price">¥ ${item.price}</div>
                <div class="stock ${item.stock <= 1 ? 'low' : ''}">
                    ${item.stock == 0 ? '<span class="badge">已售罄</span>' : '剩余库存：' + item.stock}
                </div>
            </div>
        `;

        card.onclick = () => openModal(item);

        list.appendChild(card);
    });
}

function openModal(item) {
    const overlay = document.getElementById("overlay");
    const modalCard = document.getElementById("modalCard");

    modalCard.innerHTML = `
        <img src="${item.image || 'https://via.placeholder.com/500'}">
        <div class="name" style="font-size:20px;margin-bottom:8px">${item.name}</div>
        <div class="spec">${item.spec}</div>
        <div class="price" style="margin-top:10px;font-size:18px">¥ ${item.price}</div>
        <div class="stock" style="margin-top:6px">
            ${item.stock == 0 ? '<span class="badge">已售罄</span>' : '剩余库存：' + item.stock}
        </div>
    `;

    overlay.classList.add("active");
}

function closeModal() {
    document.getElementById("overlay").classList.remove("active");
}

loadProducts();

client
.channel('realtime-products')
.on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, () => {
    loadProducts();
})
.subscribe();
</script>

</body>
</html>
